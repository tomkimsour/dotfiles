# Minimal hyprlock config — matches the waybar palette.
general {
    hide_cursor = true
    grace = 2
    ignore_empty_input = true
}

background {
    monitor =
    color = rgba(16, 19, 21, 1.0)
    blur_passes = 2
    blur_size = 4
}

input-field {
    monitor =
    size = 280, 44
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(165, 85, 85, 1.0)
    inner_color = rgba(20, 23, 25, 1.0)
    font_color = rgba(202, 204, 204, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Password…</i>
    position = 0, -20
    halign = center
    valign = center
}

# Big clock
label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(202, 204, 204, 1.0)
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B')"
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    color = rgba(107, 113, 115, 1.0)
    position = 0, 60
    halign = center
    valign = center
}

# Kitty configuration — mirrored from ~/.config/ghostty/config
# Goal: match the ghostty keybinds and applicable settings.

# --- Font -------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font Mono
# ghostty: font-feature = -liga  ->  uncomment to disable ligatures
# disable_ligatures always

# ghostty: language = fr  ->  no kitty equivalent (GTK locale/spellcheck only)

# --- Background -------------------------------------------------------------
background_opacity 1.0

# ghostty background image (fit=cover, opacity=0.02).
# kitty has no per-image opacity; background_tint blends the background color
# over the image instead. tint 0.98 leaves the image ~2% visible (matches 0.02).
background_image         /home/thomasung/Pictures/Wallpapers/angkor.jpg
background_image_layout  scaled
background_tint          0.98

# --- Window behavior --------------------------------------------------------
# ghostty: confirm-close-surface = true
confirm_os_window_close  -1

# ghostty: resize-overlay = never  (kitty has no resize overlay popup)
# ghostty: gtk-titlebar-style = tabs  ->  use kitty's tab bar at the top
tab_bar_edge top
# ghostty: quit-after-last-window-closed = false  ->  macOS-only in kitty
# ghostty: custom-shader / async-backend / quick-terminal-* -> no kitty equivalent

# Splits are required for the new_split / goto_split keybinds below.
enabled_layouts splits,stack

# --- Keybinds ---------------------------------------------------------------
# ghostty: global:ctrl+alt+s=toggle_quick_terminal
#   kitty has no quick terminal and no global (system-wide) keybinds.

# Leader-style sequences under ctrl+space (matches ghostty's ctrl+space> prefix)
map ctrl+space>w close_tab
map ctrl+space>c close_window_with_confirmation
map ctrl+space>s launch --location=hsplit --cwd=current
map ctrl+space>v launch --location=vsplit --cwd=current

# Move between splits (ghostty: goto_split)
map ctrl+k neighboring_window up
map ctrl+j neighboring_window down
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right

# Go to tab N (ghostty: ctrl+space>N=goto_tab:N)
map ctrl+space>1 goto_tab 1
map ctrl+space>2 goto_tab 2
map ctrl+space>3 goto_tab 3
map ctrl+space>4 goto_tab 4
map ctrl+space>5 goto_tab 5
map ctrl+space>6 goto_tab 6
map ctrl+space>7 goto_tab 7
map ctrl+space>8 goto_tab 8
map ctrl+space>9 goto_tab 9
